<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Override / Masking — OSFabricum</title>
<style>
  :root{--bg:#121212;--surface:#1e1e1e;--border:#333;--text:#e0e0e0;--muted:#888;
    --accent:#4a148c;--accent2:#ab47bc;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px}
  header h1{font-size:16px;font-weight:600}header a{color:var(--muted);font-size:12px;text-decoration:none}header a:hover{color:var(--text)}
  .tabs{display:flex;gap:2px;background:var(--bg);padding:8px 20px 0;border-bottom:1px solid var(--border)}
  .tab{padding:8px 16px;border:1px solid transparent;border-bottom:none;cursor:pointer;border-radius:4px 4px 0 0;color:var(--muted);font-size:13px}
  .tab.active{background:var(--surface);border-color:var(--border);color:var(--text)}.tab:hover:not(.active){color:var(--text)}
  .content{flex:1;overflow:auto;padding:20px}.pane{display:none}.pane.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
  .card h3{font-size:14px;margin-bottom:12px;color:var(--accent2)}
  .form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
  label{font-size:12px;color:var(--muted);min-width:130px}
  input,select{background:#2a2a2a;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-size:13px;flex:1;min-width:160px}
  input:focus,select:focus{outline:none;border-color:var(--accent2)}
  button{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:4px;cursor:pointer;font-size:13px}
  button:hover{background:var(--accent2)}button.secondary{background:#333}button.secondary:hover{background:#444}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500}
  td{padding:8px 10px;border-bottom:1px solid #292929}tr:hover td{background:#1a1a1a}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .badge-purple{background:#4a148c;color:#e1bee7}.badge-red{background:#b71c1c;color:#ffcdd2}
  .badge-yellow{background:#f57f17;color:#fff9c4}.badge-green{background:#1b5e20;color:#a5d6a7}
  .badge-teal{background:#004d40;color:#80cbc4}.badge-grey{background:#37474f;color:#cfd8dc}
  .hash{font-family:monospace;font-size:11px;color:var(--muted)}
  pre{background:#0d0d0d;border:1px solid var(--border);border-radius:4px;padding:12px;font-size:12px;overflow:auto;max-height:400px;white-space:pre-wrap}
  .msg{padding:8px 12px;border-radius:4px;margin-top:8px;font-size:13px}
  .msg.ok{background:#1b5e20;color:#a5d6a7}.msg.err{background:#7f0000;color:#ffcdd2}
  .row-action{display:flex;gap:8px}
</style>
</head>
<body>
<header><h1>Override / Masking Engine</h1><a href="/">← Dashboard</a></header>
<div class="tabs">
  <div class="tab active" data-tab="profiles">Profiles</div>
  <div class="tab" data-tab="kinds">Action Kinds</div>
  <div class="tab" data-tab="rules">Rules</div>
  <div class="tab" data-tab="render">Render</div>
</div>
<div class="content">

<div class="pane active" id="pane-profiles">
  <div class="card">
    <h3>Create Override Profile</h3>
    <div class="form-row"><label>Name</label><input id="p-name" placeholder="production-overrides"></div>
    <div class="form-row"><label>Description</label><input id="p-desc" placeholder="optional"></div>
    <div class="form-row"><button onclick="createProfile()">Create</button></div>
    <div id="p-msg"></div>
  </div>
  <div class="card">
    <h3>Override Profiles</h3>
    <button class="secondary" style="margin-bottom:10px" onclick="loadProfiles()">Refresh</button>
    <table id="profiles-table">
      <thead><tr><th>Name</th><th>Description</th><th>Hash</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-kinds">
  <div class="card">
    <h3>Override Action Kinds</h3>
    <button class="secondary" style="margin-bottom:10px" onclick="loadKinds()">Refresh</button>
    <table id="kinds-table">
      <thead><tr><th>#</th><th>Kind</th><th>Label</th><th>Description</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-rules">
  <div class="card">
    <h3>Add / Update Rule</h3>
    <div class="form-row"><label>Profile ID</label><input id="r-pid" placeholder="profile UUID"></div>
    <div class="form-row"><label>Target Type</label>
      <select id="r-type">
        <option value="package">package</option>
        <option value="config">config</option>
        <option value="kernel-param">kernel-param</option>
        <option value="service">service</option>
        <option value="sysctl">sysctl</option>
      </select>
    </div>
    <div class="form-row"><label>Target Key</label><input id="r-key" placeholder="net.ipv4.ip_forward"></div>
    <div class="form-row"><label>Action</label>
      <select id="r-action">
        <option value="set">set</option>
        <option value="unset">unset</option>
        <option value="mask">mask</option>
        <option value="append">append</option>
        <option value="prepend">prepend</option>
        <option value="replace">replace</option>
      </select>
    </div>
    <div class="form-row"><label>Value</label><input id="r-val" placeholder="optional value"></div>
    <div class="form-row"><label>Reason</label><input id="r-reason" placeholder="why this override"></div>
    <div class="form-row"><label>Priority</label><input id="r-prio" type="number" value="0"></div>
    <div class="form-row"><button onclick="addRule()">Add / Update</button></div>
    <div id="r-msg"></div>
  </div>
  <div class="card">
    <h3>List Rules</h3>
    <div class="form-row">
      <input id="r-list-pid" placeholder="Profile ID">
      <select id="r-filter-type" style="max-width:160px">
        <option value="">All types</option>
        <option value="package">package</option>
        <option value="config">config</option>
        <option value="kernel-param">kernel-param</option>
        <option value="service">service</option>
        <option value="sysctl">sysctl</option>
      </select>
      <button onclick="loadRules()">Load</button>
    </div>
    <table id="rules-table">
      <thead><tr><th>Type</th><th>Key</th><th>Action</th><th>Value</th><th>Prio</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-render">
  <div class="card">
    <h3>Render Override Policy</h3>
    <div class="form-row"><label>Profile ID</label><input id="rn-pid" placeholder="profile UUID"></div>
    <div class="form-row"><button onclick="renderProfile()">Render</button></div>
    <div id="rn-msg"></div>
  </div>
  <div class="card" id="rn-result" style="display:none">
    <h3>Override Policy</h3>
    <div class="hash" id="rn-hash"></div>
    <pre id="rn-policy" style="margin-top:12px"></pre>
  </div>
</div>

</div>
<script>
const API='/v1';
function tabs(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));t.classList.add('active');document.getElementById('pane-'+t.dataset.tab).classList.add('active')})});}
function msg(id,text,ok){const el=document.getElementById(id);el.className='msg '+(ok?'ok':'err');el.textContent=text;setTimeout(()=>el.textContent='',4000);}
async function api(method,path,body){const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);const r=await fetch(API+path,opts);if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText);}return r.json();}
function actionBadge(a){const cls={set:'badge-green',unset:'badge-red',mask:'badge-red',append:'badge-teal',prepend:'badge-teal',replace:'badge-yellow'}[a]||'badge-grey';return`<span class="badge ${cls}">${a}</span>`;}
function typeBadge(t){return`<span class="badge badge-purple">${t}</span>`;}
async function loadProfiles(){try{const ps=await api('GET','/override-profiles');document.querySelector('#profiles-table tbody').innerHTML=ps.map(p=>`<tr><td>${p.name}</td><td style="color:var(--muted)">${p.description||'—'}</td><td class="hash">${p.content_hash?p.content_hash.slice(7,23)+'…':'—'}</td><td><div class="row-action"><button class="secondary" onclick="fillRules('${p.id}')">Rules</button><button class="secondary" onclick="fillRender('${p.id}')">Render</button></div></td></tr>`).join('');}catch(e){console.error(e);}}
async function loadKinds(){try{const ks=await api('GET','/override-kinds');document.querySelector('#kinds-table tbody').innerHTML=ks.map(k=>`<tr><td>${k.display_order}</td><td>${actionBadge(k.kind)}</td><td>${k.label}</td><td>${k.description}</td></tr>`).join('');}catch(e){console.error(e);}}
async function createProfile(){try{await api('POST','/override-profiles',{name:document.getElementById('p-name').value,description:document.getElementById('p-desc').value});msg('p-msg','Profile created',true);loadProfiles();}catch(e){msg('p-msg',e.message,false);}}
async function addRule(){const pid=document.getElementById('r-pid').value;try{await api('PUT',`/override-profiles/${pid}/rules`,{target_type:document.getElementById('r-type').value,target_key:document.getElementById('r-key').value,action:document.getElementById('r-action').value,value:document.getElementById('r-val').value||null,reason:document.getElementById('r-reason').value,priority:parseInt(document.getElementById('r-prio').value)||0});msg('r-msg','Rule set',true);document.getElementById('r-list-pid').value=pid;loadRules();}catch(e){msg('r-msg',e.message,false);}}
async function loadRules(){const pid=document.getElementById('r-list-pid').value;if(!pid)return;const ft=document.getElementById('r-filter-type').value;try{const qs=ft?`?target_type=${ft}`:'';const rs=await api('GET',`/override-profiles/${pid}/rules${qs}`);document.querySelector('#rules-table tbody').innerHTML=rs.map(r=>`<tr><td>${typeBadge(r.target_type)}</td><td><code>${r.target_key}</code></td><td>${actionBadge(r.action)}</td><td style="color:var(--muted)">${r.value||'—'}</td><td>${r.priority}</td></tr>`).join('');}catch(e){console.error(e);}}
function fillRules(pid){document.getElementById('r-pid').value=pid;document.getElementById('r-list-pid').value=pid;document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));document.querySelector('[data-tab="rules"]').classList.add('active');document.getElementById('pane-rules').classList.add('active');loadRules();}
function fillRender(pid){document.getElementById('rn-pid').value=pid;document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));document.querySelector('[data-tab="render"]').classList.add('active');document.getElementById('pane-render').classList.add('active');}
async function renderProfile(){const pid=document.getElementById('rn-pid').value;try{const r=await api('POST',`/override-profiles/${pid}/render`);document.getElementById('rn-hash').textContent=r.content_hash;document.getElementById('rn-policy').textContent=r.rendered_override_policy||'';document.getElementById('rn-result').style.display='block';msg('rn-msg','Rendered',true);loadProfiles();}catch(e){msg('rn-msg',e.message,false);}}
tabs();loadProfiles();loadKinds();
</script>
</body></html>
