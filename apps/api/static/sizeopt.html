<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSFabricum — Size Optimizer</title>
<style>
:root{--accent:#880e4f;--accent-light:#ad1457;--bg:#0a0a0f;--surface:#12121a;--border:#1e2030;--text:#e0e0e0;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.2rem;font-weight:600}
.badge{background:var(--accent);color:#fff;font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700}
nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px}
.tab{padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:.85rem;transition:.2s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.pane{display:none;padding:24px}
.pane.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px}
input,select{background:#1a1a28;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:.85rem;width:100%;margin-bottom:12px}
button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:.85rem;font-weight:600}
button:hover{background:var(--accent-light)}
.result{background:#0d0d18;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:.8rem;white-space:pre-wrap;max-height:420px;overflow:auto;color:#fce4ec}
</style>
</head>
<body>
<header>
  <h1>Size / Footprint Optimizer</h1>
  <span class="badge">M65</span>
</header>
<nav>
  <div class="tab active" onclick="show('budget')">Budgets</div>
  <div class="tab" onclick="show('analyze')">Analyze</div>
  <div class="tab" onclick="show('kinds')">Budget Kinds</div>
</nav>

<div id="budget" class="pane active">
  <div class="card">
    <label>Profile ID</label><input id="bProfileId" placeholder="profile-uuid">
    <button onclick="loadBudgets()">Load Budgets</button>
  </div>
  <div id="budgetList" class="result">(enter profile ID and click Load Budgets)</div>
  <div class="card" style="margin-top:16px">
    <label>Set Budget — Kind</label>
    <select id="bKind"><option>image</option><option>rootfs</option><option>package-set</option><option>kernel</option><option>initramfs</option><option>apps</option></select>
    <label>Budget Bytes</label><input id="bBytes" type="number" value="536870912" placeholder="bytes">
    <label><input type="checkbox" id="bHard"> Hard Limit</label><br><br>
    <button onclick="setBudget()">Set Budget</button>
  </div>
  <div id="setBudgetResult" class="result"></div>
</div>

<div id="analyze" class="pane">
  <div class="card">
    <label>Build ID</label><input id="aBuildId" placeholder="build-uuid">
    <label>Profile ID (optional)</label><input id="aProfileId" placeholder="profile-uuid">
    <button onclick="analyzeSize()">Analyze Size</button>
  </div>
  <div id="analyzeResult" class="result"></div>
</div>

<div id="kinds" class="pane">
  <div class="card"><button onclick="loadKinds()">Load Size Budget Kinds</button></div>
  <div id="kindsResult" class="result"></div>
</div>

<script>
function show(id){document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active')}
async function loadBudgets(){
  const id=document.getElementById('bProfileId').value.trim();
  const r=await fetch('/v1/profiles/'+id+'/size-budget');
  const d=await r.json();
  if(!d.length){document.getElementById('budgetList').textContent='(no budgets)';return}
  document.getElementById('budgetList').textContent=d.map(x=>`${x.budget_kind.padEnd(14)} ${x.budget_bytes} bytes  ${x.is_hard_limit?'HARD':'soft'}`).join('\n');
}
async function setBudget(){
  const pid=document.getElementById('bProfileId').value.trim();
  const body={budget_kind:document.getElementById('bKind').value,budget_bytes:parseInt(document.getElementById('bBytes').value),is_hard_limit:document.getElementById('bHard').checked};
  const r=await fetch('/v1/profiles/'+pid+'/size-budget',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  document.getElementById('setBudgetResult').textContent=JSON.stringify(await r.json(),null,2);
}
async function analyzeSize(){
  const bid=document.getElementById('aBuildId').value.trim();
  const pid=document.getElementById('aProfileId').value.trim();
  const body=pid?{profile_id:pid}:{};
  const r=await fetch('/v1/builds/'+bid+'/size',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json();
  document.getElementById('analyzeResult').textContent=d.rendered_report||JSON.stringify(d,null,2);
}
async function loadKinds(){
  const r=await fetch('/v1/size-budget-kinds');
  const d=await r.json();
  document.getElementById('kindsResult').textContent=d.map(x=>`${x.kind.padEnd(14)} ${x.label}`).join('\n');
}
</script>
</body>
</html>
