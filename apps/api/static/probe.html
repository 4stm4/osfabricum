<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardware Probe — OSFabricum</title>
<style>
  :root{--bg:#121212;--surface:#1e1e1e;--border:#333;--text:#e0e0e0;--muted:#888;
    --accent:#bf360c;--accent2:#ff7043;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px}
  header h1{font-size:16px;font-weight:600}header a{color:var(--muted);font-size:12px;text-decoration:none}header a:hover{color:var(--text)}
  .tabs{display:flex;gap:2px;background:var(--bg);padding:8px 20px 0;border-bottom:1px solid var(--border)}
  .tab{padding:8px 16px;border:1px solid transparent;border-bottom:none;cursor:pointer;border-radius:4px 4px 0 0;color:var(--muted);font-size:13px}
  .tab.active{background:var(--surface);border-color:var(--border);color:var(--text)}.tab:hover:not(.active){color:var(--text)}
  .content{flex:1;overflow:auto;padding:20px}.pane{display:none}.pane.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
  .card h3{font-size:14px;margin-bottom:12px;color:var(--accent2)}
  .form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
  label{font-size:12px;color:var(--muted);min-width:120px}
  input,select,textarea{background:#2a2a2a;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-size:13px;flex:1;min-width:160px}
  textarea{resize:vertical;min-height:120px;font-family:monospace}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2)}
  button{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:4px;cursor:pointer;font-size:13px}
  button:hover{background:var(--accent2)}button.secondary{background:#333}button.secondary:hover{background:#444}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500}
  td{padding:8px 10px;border-bottom:1px solid #292929}tr:hover td{background:#1a1a1a}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .badge-orange{background:#bf360c;color:#ffccbc}.hash{font-family:monospace;font-size:11px;color:var(--muted)}
  pre{background:#0d0d0d;border:1px solid var(--border);border-radius:4px;padding:12px;font-size:12px;overflow:auto;max-height:400px;white-space:pre-wrap}
  .msg{padding:8px 12px;border-radius:4px;margin-top:8px;font-size:13px}
  .msg.ok{background:#1b5e20;color:#a5d6a7}.msg.err{background:#7f0000;color:#ffcdd2}
</style>
</head>
<body>
<header><h1>Hardware Probe Import</h1><a href="/">← Dashboard</a></header>
<div class="tabs">
  <div class="tab active" data-tab="import">Import</div>
  <div class="tab" data-tab="probes">Probes</div>
  <div class="tab" data-tab="sources">Sources</div>
</div>
<div class="content">

<div class="pane active" id="pane-import">
  <div class="card">
    <h3>Import Hardware Probe</h3>
    <div class="form-row"><label>Name</label><input id="i-name" placeholder="rpi4-node-01"></div>
    <div class="form-row"><label>Source</label>
      <select id="i-source">
        <option value="manual">manual</option>
        <option value="lshw">lshw</option>
        <option value="dmidecode">dmidecode</option>
        <option value="udev">udev</option>
        <option value="sysfs">sysfs</option>
      </select>
    </div>
    <div class="form-row"><label>Probe JSON</label>
      <textarea id="i-json" placeholder='{"cpu_arch":"aarch64","cpu_model":"Cortex-A72","mem_mb":4096}'></textarea>
    </div>
    <div class="form-row"><button onclick="importProbe()">Import</button></div>
    <div id="i-msg"></div>
  </div>
  <div class="card">
    <h3>Quick Templates</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="secondary" onclick="setTemplate('rpi4')">Raspberry Pi 4</button>
      <button class="secondary" onclick="setTemplate('x86')">x86_64 Server</button>
      <button class="secondary" onclick="setTemplate('riscv')">RISC-V Board</button>
    </div>
  </div>
</div>

<div class="pane" id="pane-probes">
  <div class="card">
    <h3>Hardware Probes</h3>
    <button class="secondary" style="margin-bottom:10px" onclick="loadProbes()">Refresh</button>
    <table id="probes-table">
      <thead><tr><th>Name</th><th>Source</th><th>Arch</th><th>CPU</th><th>RAM</th><th>Hash</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
  <div id="probe-detail" style="display:none">
    <div class="card"><h3 id="pd-title"></h3><pre id="pd-hints"></pre></div>
  </div>
</div>

<div class="pane" id="pane-sources">
  <div class="card">
    <h3>Probe Source Kinds</h3>
    <button class="secondary" style="margin-bottom:10px" onclick="loadSources()">Refresh</button>
    <table id="sources-table">
      <thead><tr><th>#</th><th>Kind</th><th>Label</th><th>Description</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>
</div>

<script>
const API='/v1';const TEMPLATES={
  rpi4:'{"cpu_arch":"aarch64","cpu_model":"Cortex-A72","mem_mb":4096,"board":"Raspberry Pi 4","gpu":"VideoCore VI"}',
  x86:'{"cpu_arch":"x86_64","cpu_model":"Intel Xeon E5-2690","mem_mb":65536,"numa_nodes":2}',
  riscv:'{"cpu_arch":"riscv64","cpu_model":"SiFive U74","mem_mb":8192,"isa":"rv64gc"}'
};
function tabs(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));t.classList.add('active');document.getElementById('pane-'+t.dataset.tab).classList.add('active')})});}
function msg(id,text,ok){const el=document.getElementById(id);el.className='msg '+(ok?'ok':'err');el.textContent=text;setTimeout(()=>el.textContent='',4000);}
async function api(method,path,body){const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);const r=await fetch(API+path,opts);if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText);}return r.json();}
function setTemplate(name){document.getElementById('i-json').value=TEMPLATES[name];}
async function importProbe(){
  try{const data=JSON.parse(document.getElementById('i-json').value);
    await api('POST','/hardware-probes',{name:document.getElementById('i-name').value,probe_data:data,probe_source:document.getElementById('i-source').value});
    msg('i-msg','Probe imported',true);loadProbes();}catch(e){msg('i-msg',e.message,false);}
}
async function loadProbes(){
  try{const probes=await api('GET','/hardware-probes');
    document.querySelector('#probes-table tbody').innerHTML=probes.map(p=>`<tr>
      <td>${p.name}</td><td><span class="badge badge-orange">${p.probe_source}</span></td>
      <td>${p.cpu_arch||'—'}</td><td>${(p.cpu_model||'—').slice(0,30)}</td>
      <td>${p.mem_mb?p.mem_mb+' MB':'—'}</td>
      <td class="hash">${p.content_hash?p.content_hash.slice(7,23)+'…':'—'}</td>
      <td><button class="secondary" onclick="showProbe('${p.id}','${p.name}')">Hints</button>
          <button class="secondary" onclick="deleteProbe('${p.id}')">Del</button></td>
    </tr>`).join('');}catch(e){console.error(e);}
}
async function showProbe(id,name){
  try{const p=await api('GET','/hardware-probes/'+id);
    document.getElementById('pd-title').textContent='Board Hints — '+name;
    document.getElementById('pd-hints').textContent=p.rendered_board_hints||'(no hints)';
    document.getElementById('probe-detail').style.display='block';}catch(e){console.error(e);}
}
async function deleteProbe(id){
  if(!confirm('Delete probe '+id+'?'))return;
  try{await api('DELETE','/hardware-probes/'+id);loadProbes();}catch(e){console.error(e);}
}
async function loadSources(){
  try{const kinds=await api('GET','/probe-source-kinds');
    document.querySelector('#sources-table tbody').innerHTML=kinds.map(k=>`<tr>
      <td>${k.display_order}</td><td><span class="badge badge-orange">${k.kind}</span></td>
      <td>${k.label}</td><td>${k.description}</td></tr>`).join('');}catch(e){console.error(e);}
}
tabs();loadProbes();loadSources();
</script>
</body></html>
