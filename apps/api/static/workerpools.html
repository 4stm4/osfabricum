<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSFabricum — Worker Pools</title>
<style>
:root{--accent:#1a237e;--accent-light:#283593;--bg:#0a0a0f;--surface:#12121a;--border:#1e2030;--text:#e0e0e0;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.2rem;font-weight:600}
.badge{background:var(--accent);color:#fff;font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700}
nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px}
.tab{padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:.85rem;transition:.2s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.pane{display:none;padding:24px}
.pane.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px}
input,select{background:#1a1a28;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:.85rem;width:100%;margin-bottom:12px}
button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:.85rem;font-weight:600}
button:hover{background:var(--accent-light)}
.result{background:#0d0d18;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:.8rem;white-space:pre-wrap;max-height:400px;overflow:auto;color:#bbdefb}
</style>
</head>
<body>
<header>
  <h1>Distributed Build Farm — Worker Pools</h1>
  <span class="badge">M67</span>
</header>
<nav>
  <div class="tab active" onclick="show('list')">Pools</div>
  <div class="tab" onclick="show('create')">Create Pool</div>
  <div class="tab" onclick="show('members')">Members</div>
  <div class="tab" onclick="show('quotas')">Quotas</div>
</nav>

<div id="list" class="pane active">
  <div class="card">
    <label>Filter by kind (optional)</label>
    <select id="lKind"><option value="">All</option><option>local</option><option>remote</option><option>trusted</option><option>signing-only</option><option>hardware-lab</option><option>qemu-test</option></select>
    <button onclick="loadPools()">Load</button>
  </div>
  <div id="listResult" class="result">(click Load)</div>
</div>

<div id="create" class="pane">
  <div class="card">
    <label>Name</label><input id="cName" placeholder="main-pool">
    <label>Label</label><input id="cLabel" placeholder="Main build pool">
    <label>Pool Kind</label>
    <select id="cKind"><option>local</option><option>remote</option><option>trusted</option><option>signing-only</option><option>hardware-lab</option><option>qemu-test</option></select>
    <label>Max Parallelism</label><input id="cPar" type="number" value="4">
    <button onclick="createPool()">Create Pool</button>
  </div>
  <div id="createResult" class="result"></div>
</div>

<div id="members" class="pane">
  <div class="card">
    <label>Pool ID</label><input id="mPoolId" placeholder="pool-uuid">
    <label>Worker ID (optional)</label><input id="mWorkerId" placeholder="worker-uuid">
    <button onclick="addMember()">Add Member</button>
  </div>
  <div id="membersResult" class="result"></div>
</div>

<div id="quotas" class="pane">
  <div class="card">
    <label>Pool ID</label><input id="qPoolId" placeholder="pool-uuid">
    <label>Resource Kind</label>
    <select id="qKind"><option>cpu</option><option>memory</option><option>disk</option><option>network</option></select>
    <label>Limit Value</label><input id="qLimit" type="number" value="8">
    <button onclick="setQuota()">Set Quota</button>
  </div>
  <div id="quotasResult" class="result"></div>
</div>

<script>
function show(id){document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active')}
async function loadPools(){
  const k=document.getElementById('lKind').value;
  const q=k?`?pool_kind=${k}`:'';
  const r=await fetch('/v1/worker-pools'+q);
  const d=await r.json();
  if(!d.length){document.getElementById('listResult').textContent='(no pools)';return}
  document.getElementById('listResult').textContent=d.map(x=>`${x.id.slice(0,8)}  ${x.name}  kind=${x.pool_kind}  par=${x.max_parallelism}`).join('\n');
}
async function createPool(){
  const body={name:document.getElementById('cName').value,label:document.getElementById('cLabel').value,pool_kind:document.getElementById('cKind').value,max_parallelism:parseInt(document.getElementById('cPar').value)};
  const r=await fetch('/v1/worker-pools',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  document.getElementById('createResult').textContent=JSON.stringify(await r.json(),null,2);
}
async function addMember(){
  const pid=document.getElementById('mPoolId').value.trim();
  const body={};const w=document.getElementById('mWorkerId').value.trim();if(w)body.worker_id=w;
  const r=await fetch('/v1/worker-pools/'+pid+'/members',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  document.getElementById('membersResult').textContent=JSON.stringify(await r.json(),null,2);
}
async function setQuota(){
  const pid=document.getElementById('qPoolId').value.trim();
  const body={resource_kind:document.getElementById('qKind').value,limit_value:parseInt(document.getElementById('qLimit').value)};
  const r=await fetch('/v1/worker-pools/'+pid+'/quotas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  document.getElementById('quotasResult').textContent=JSON.stringify(await r.json(),null,2);
}
</script>
</body>
</html>
