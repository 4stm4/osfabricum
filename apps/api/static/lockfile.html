<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSFabricum — Lockfile Manager</title>
<style>
:root{--accent:#4a148c;--accent-light:#6a1b9a;--bg:#0a0a0f;--surface:#12121a;--border:#1e2030;--text:#e0e0e0;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.2rem;font-weight:600}
.badge{background:var(--accent);color:#fff;font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700}
nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px}
.tab{padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:.85rem;transition:.2s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.pane{display:none;padding:24px}
.pane.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px}
input,select{background:#1a1a28;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:.85rem;width:100%;margin-bottom:12px}
button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:.85rem;font-weight:600}
button:hover{background:var(--accent-light)}
.result{background:#0d0d18;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:.8rem;white-space:pre-wrap;max-height:400px;overflow:auto;color:#e1bee7}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{background:var(--border);padding:8px 12px;text-align:left;color:var(--muted)}
td{padding:8px 12px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <h1>Lockfile Manager</h1>
  <span class="badge">M62</span>
</header>
<nav>
  <div class="tab active" onclick="show('list')">Lockfiles</div>
  <div class="tab" onclick="show('create')">Generate</div>
  <div class="tab" onclick="show('render')">Render</div>
  <div class="tab" onclick="show('diff')">Diff</div>
</nav>

<div id="list" class="pane active">
  <div class="card">
    <label>Distribution ID (optional filter)</label>
    <input id="listDist" placeholder="dist-uuid">
    <button onclick="loadList()">Load</button>
  </div>
  <div id="listResult" class="result">(click Load)</div>
</div>

<div id="create" class="pane">
  <div class="card">
    <label>Distribution ID</label><input id="cDistId" placeholder="dist-uuid">
    <label>Profile ID (optional)</label><input id="cProfileId" placeholder="profile-uuid">
    <label>Build ID (optional)</label><input id="cBuildId" placeholder="build-uuid">
    <label>Lock Version</label><input id="cVersion" value="1">
    <button onclick="createLockfile()">Generate Lockfile</button>
  </div>
  <div id="createResult" class="result"></div>
</div>

<div id="render" class="pane">
  <div class="card">
    <label>Lockfile ID</label><input id="renderId" placeholder="lockfile-uuid">
    <button onclick="renderLockfile()">Render</button>
  </div>
  <div id="renderResult" class="result"></div>
</div>

<div id="diff" class="pane">
  <div class="card">
    <label>Lockfile A ID</label><input id="diffA" placeholder="lockfile-uuid">
    <label>Lockfile B ID</label><input id="diffB" placeholder="lockfile-uuid">
    <button onclick="diffLockfiles()">Diff</button>
  </div>
  <div id="diffResult" class="result"></div>
</div>

<script>
function show(id){document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active')}
async function loadList(){
  const d=document.getElementById('listDist').value;
  const q=d?`?distribution_id=${d}`:'';
  const r=await fetch('/v1/lockfiles'+q);
  const data=await r.json();
  if(!data.length){document.getElementById('listResult').textContent='(no lockfiles)';return}
  document.getElementById('listResult').textContent=data.map(x=>`${x.id.slice(0,8)}  dist=${x.distribution_id||'—'}  v=${x.lock_version}  hash=${x.content_hash||'—'}`).join('\n');
}
async function createLockfile(){
  const body={distribution_id:document.getElementById('cDistId').value,lock_version:document.getElementById('cVersion').value};
  const p=document.getElementById('cProfileId').value;if(p)body.profile_id=p;
  const b=document.getElementById('cBuildId').value;if(b)body.build_id=b;
  const r=await fetch('/v1/lockfiles',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  document.getElementById('createResult').textContent=JSON.stringify(await r.json(),null,2);
}
async function renderLockfile(){
  const id=document.getElementById('renderId').value.trim();
  const r=await fetch('/v1/lockfiles/'+id+'/render',{method:'POST'});
  const d=await r.json();
  document.getElementById('renderResult').textContent=d.rendered_lock||JSON.stringify(d,null,2);
}
async function diffLockfiles(){
  const a=document.getElementById('diffA').value.trim();
  const b=document.getElementById('diffB').value.trim();
  const r=await fetch('/v1/lockfiles/diff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lockfile_a:a,lockfile_b:b})});
  document.getElementById('diffResult').textContent=JSON.stringify(await r.json(),null,2);
}
</script>
</body>
</html>
