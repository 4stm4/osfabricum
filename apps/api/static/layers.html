<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layers Designer — OSFabricum</title>
<style>
  :root{--bg:#121212;--surface:#1e1e1e;--border:#333;--text:#e0e0e0;--muted:#888;
    --accent:#1565c0;--accent2:#42a5f5;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px}
  header h1{font-size:16px;font-weight:600}header a{color:var(--muted);font-size:12px;text-decoration:none}header a:hover{color:var(--text)}
  .tabs{display:flex;gap:2px;background:var(--bg);padding:8px 20px 0;border-bottom:1px solid var(--border)}
  .tab{padding:8px 16px;border:1px solid transparent;border-bottom:none;cursor:pointer;border-radius:4px 4px 0 0;color:var(--muted);font-size:13px}
  .tab.active{background:var(--surface);border-color:var(--border);color:var(--text)}.tab:hover:not(.active){color:var(--text)}
  .content{flex:1;overflow:auto;padding:20px}.pane{display:none}.pane.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
  .card h3{font-size:14px;margin-bottom:12px;color:var(--accent2)}
  .form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
  label{font-size:12px;color:var(--muted);min-width:120px}
  input,select{background:#2a2a2a;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-size:13px;flex:1;min-width:160px}
  input:focus,select:focus{outline:none;border-color:var(--accent2)}
  button{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:4px;cursor:pointer;font-size:13px}
  button:hover{background:var(--accent2)}button.secondary{background:#333}button.secondary:hover{background:#444}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500}
  td{padding:8px 10px;border-bottom:1px solid #292929}tr:hover td{background:#1a1a1a}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .badge-blue{background:#0d47a1;color:#bbdefb}.badge-green{background:#1b5e20;color:#a5d6a7}
  .badge-grey{background:#37474f;color:#cfd8dc}
  .hash{font-family:monospace;font-size:11px;color:var(--muted)}
  pre{background:#0d0d0d;border:1px solid var(--border);border-radius:4px;padding:12px;font-size:12px;overflow:auto;max-height:400px;white-space:pre-wrap}
  .msg{padding:8px 12px;border-radius:4px;margin-top:8px;font-size:13px}
  .msg.ok{background:#1b5e20;color:#a5d6a7}.msg.err{background:#7f0000;color:#ffcdd2}
  .row-action{display:flex;gap:8px}
</style>
</head>
<body>
<header><h1>OS Composition Layers Designer</h1><a href="/">← Dashboard</a></header>
<div class="tabs">
  <div class="tab active" data-tab="profiles">Profiles</div>
  <div class="tab" data-tab="kinds">Layer Kinds</div>
  <div class="tab" data-tab="entries">Entries</div>
  <div class="tab" data-tab="render">Render</div>
</div>
<div class="content">

<div class="pane active" id="pane-profiles">
  <div class="card">
    <h3>Create Layer Profile</h3>
    <div class="form-row"><label>Name</label><input id="p-name" placeholder="base-aarch64"></div>
    <div class="form-row"><label>Base Layer</label>
      <select id="p-base">
        <option value="base">base</option>
        <option value="bsp">bsp</option>
        <option value="extension">extension</option>
      </select>
    </div>
    <div class="form-row"><label>Description</label><input id="p-desc" placeholder="optional"></div>
    <div class="form-row"><button onclick="createProfile()">Create</button></div>
    <div id="p-msg"></div>
  </div>
  <div class="card">
    <h3>Layer Profiles</h3>
    <button class="secondary" style="margin-bottom:10px" onclick="loadProfiles()">Refresh</button>
    <table id="profiles-table">
      <thead><tr><th>Name</th><th>Base Layer</th><th>Hash</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-kinds">
  <div class="card">
    <h3>Layer Kind Catalogue</h3>
    <button class="secondary" style="margin-bottom:10px" onclick="loadKinds()">Refresh</button>
    <table id="kinds-table">
      <thead><tr><th>#</th><th>Kind</th><th>Label</th><th>Description</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-entries">
  <div class="card">
    <h3>Add / Update Layer Entry</h3>
    <div class="form-row"><label>Profile ID</label><input id="e-pid" placeholder="profile UUID"></div>
    <div class="form-row"><label>Name</label><input id="e-name" placeholder="wifi-firmware"></div>
    <div class="form-row"><label>Kind</label>
      <select id="e-kind">
        <option value="extension">extension</option>
        <option value="base">base</option>
        <option value="bsp">bsp</option>
        <option value="app">app</option>
        <option value="compliance">compliance</option>
        <option value="debug">debug</option>
      </select>
    </div>
    <div class="form-row"><label>Source URL</label><input id="e-url" placeholder="https://..."></div>
    <div class="form-row"><label>SHA256 hint</label><input id="e-sha" placeholder="sha256:..."></div>
    <div class="form-row"><label>Priority</label><input id="e-prio" type="number" value="0"></div>
    <div class="form-row"><label>Enabled?</label>
      <select id="e-enabled"><option value="true">Yes</option><option value="false">No</option></select>
    </div>
    <div class="form-row"><button onclick="addEntry()">Add / Update</button></div>
    <div id="e-msg"></div>
  </div>
  <div class="card">
    <h3>List Entries</h3>
    <div class="form-row"><input id="e-list-pid" placeholder="Profile ID"><button onclick="loadEntries()">Load</button></div>
    <table id="entries-table">
      <thead><tr><th>Prio</th><th>Name</th><th>Kind</th><th>Enabled?</th><th>URL</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-render">
  <div class="card">
    <h3>Render Layer Manifest</h3>
    <div class="form-row"><label>Profile ID</label><input id="r-pid" placeholder="profile UUID"></div>
    <div class="form-row"><button onclick="renderProfile()">Render</button></div>
    <div id="r-msg"></div>
  </div>
  <div class="card" id="r-result" style="display:none">
    <h3>Manifest</h3>
    <div class="hash" id="r-hash"></div>
    <pre id="r-manifest" style="margin-top:12px"></pre>
  </div>
</div>

</div>
<script>
const API='/v1';
function tabs(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));t.classList.add('active');document.getElementById('pane-'+t.dataset.tab).classList.add('active')})});}
function msg(id,text,ok){const el=document.getElementById(id);el.className='msg '+(ok?'ok':'err');el.textContent=text;setTimeout(()=>el.textContent='',4000);}
async function api(method,path,body){const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);const r=await fetch(API+path,opts);if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText);}return r.json();}
function kindBadge(k){const cls={base:'badge-blue',bsp:'badge-blue',extension:'badge-green',app:'badge-green',debug:'badge-grey',compliance:'badge-grey'}[k]||'badge-grey';return`<span class="badge ${cls}">${k}</span>`;}
async function loadProfiles(){try{const ps=await api('GET','/layer-profiles');document.querySelector('#profiles-table tbody').innerHTML=ps.map(p=>`<tr><td>${p.name}</td><td>${kindBadge(p.base_layer)}</td><td class="hash">${p.content_hash?p.content_hash.slice(7,23)+'…':'—'}</td><td><div class="row-action"><button class="secondary" onclick="fillEntries('${p.id}')">Entries</button><button class="secondary" onclick="fillRender('${p.id}')">Render</button></div></td></tr>`).join('');}catch(e){console.error(e);}}
async function loadKinds(){try{const ks=await api('GET','/layer-kinds');document.querySelector('#kinds-table tbody').innerHTML=ks.map(k=>`<tr><td>${k.display_order}</td><td>${kindBadge(k.kind)}</td><td>${k.label}</td><td>${k.description}</td></tr>`).join('');}catch(e){console.error(e);}}
async function createProfile(){try{await api('POST','/layer-profiles',{name:document.getElementById('p-name').value,base_layer:document.getElementById('p-base').value,description:document.getElementById('p-desc').value});msg('p-msg','Profile created',true);loadProfiles();}catch(e){msg('p-msg',e.message,false);}}
async function addEntry(){const pid=document.getElementById('e-pid').value;try{await api('PUT',`/layer-profiles/${pid}/entries`,{name:document.getElementById('e-name').value,layer_kind:document.getElementById('e-kind').value,source_url:document.getElementById('e-url').value||null,sha256_hint:document.getElementById('e-sha').value||null,priority:parseInt(document.getElementById('e-prio').value)||0,is_enabled:document.getElementById('e-enabled').value==='true'});msg('e-msg','Entry set',true);document.getElementById('e-list-pid').value=pid;loadEntries();}catch(e){msg('e-msg',e.message,false);}}
async function loadEntries(){const pid=document.getElementById('e-list-pid').value;if(!pid)return;try{const es=await api('GET',`/layer-profiles/${pid}/entries`);document.querySelector('#entries-table tbody').innerHTML=es.map(e=>`<tr><td>${e.priority}</td><td><b>${e.name}</b></td><td>${kindBadge(e.layer_kind)}</td><td>${e.is_enabled?'<span class="badge badge-green">yes</span>':'<span class="badge badge-grey">no</span>'}</td><td style="font-size:11px;color:var(--muted)">${e.source_url||'—'}</td></tr>`).join('');}catch(e){console.error(e);}}
function fillEntries(pid){document.getElementById('e-pid').value=pid;document.getElementById('e-list-pid').value=pid;document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));document.querySelector('[data-tab="entries"]').classList.add('active');document.getElementById('pane-entries').classList.add('active');loadEntries();}
function fillRender(pid){document.getElementById('r-pid').value=pid;document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));document.querySelector('[data-tab="render"]').classList.add('active');document.getElementById('pane-render').classList.add('active');}
async function renderProfile(){const pid=document.getElementById('r-pid').value;try{const r=await api('POST',`/layer-profiles/${pid}/render`);document.getElementById('r-hash').textContent=r.content_hash;document.getElementById('r-manifest').textContent=r.rendered_manifest||'';document.getElementById('r-result').style.display='block';msg('r-msg','Rendered',true);loadProfiles();}catch(e){msg('r-msg',e.message,false);}}
tabs();loadProfiles();loadKinds();
</script>
</body></html>
