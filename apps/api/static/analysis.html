<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSFabricum — Build Analysis</title>
<style>
:root{--accent:#006064;--accent-light:#00838f;--bg:#0a0a0f;--surface:#12121a;--border:#1e2030;--text:#e0e0e0;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.2rem;font-weight:600}
.badge{background:var(--accent);color:#fff;font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700}
nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px}
.tab{padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:.85rem;transition:.2s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.pane{display:none;padding:24px}
.pane.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px}
input,select{background:#1a1a28;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:.85rem;width:100%;margin-bottom:12px}
button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:.85rem;font-weight:600}
button:hover{background:var(--accent-light)}
.result{background:#0d0d18;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:.8rem;white-space:pre-wrap;max-height:420px;overflow:auto;color:#b2ebf2}
</style>
</head>
<body>
<header>
  <h1>Build Analysis</h1>
  <span class="badge">M64</span>
</header>
<nav>
  <div class="tab active" onclick="show('analyze')">Analyze</div>
  <div class="tab" onclick="show('list')">Reports</div>
  <div class="tab" onclick="show('show')">View Report</div>
</nav>

<div id="analyze" class="pane active">
  <div class="card">
    <label>Build ID</label><input id="aBuildId" placeholder="build-uuid">
    <label>Analysis Kind</label>
    <select id="aKind"><option>time</option><option>size</option><option>critical-path</option><option>cache</option><option>warnings</option></select>
    <button onclick="runAnalysis()">Run Analysis</button>
  </div>
  <div id="analyzeResult" class="result"></div>
</div>

<div id="list" class="pane">
  <div class="card">
    <label>Build ID</label><input id="lBuildId" placeholder="build-uuid">
    <button onclick="listAnalyses()">Load</button>
  </div>
  <div id="listResult" class="result">(enter build ID and click Load)</div>
</div>

<div id="show" class="pane">
  <div class="card">
    <label>Analysis ID</label><input id="showId" placeholder="analysis-uuid">
    <button onclick="showAnalysis()">Load</button>
  </div>
  <div id="showResult" class="result"></div>
</div>

<script>
function show(id){document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active')}
async function runAnalysis(){
  const build_id=document.getElementById('aBuildId').value.trim();
  const analysis_kind=document.getElementById('aKind').value;
  const r=await fetch('/v1/builds/'+build_id+'/analysis',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({analysis_kind})});
  const d=await r.json();
  document.getElementById('analyzeResult').textContent=d.rendered_report||JSON.stringify(d,null,2);
}
async function listAnalyses(){
  const id=document.getElementById('lBuildId').value.trim();
  const r=await fetch('/v1/builds/'+id+'/analysis');
  const d=await r.json();
  if(!d.length){document.getElementById('listResult').textContent='(no analyses)';return}
  document.getElementById('listResult').textContent=d.map(x=>`${x.id.slice(0,8)}  kind=${x.analysis_kind}  hash=${x.content_hash||'—'}`).join('\n');
}
async function showAnalysis(){
  const id=document.getElementById('showId').value.trim();
  const r=await fetch('/v1/build-analyses/'+id);
  const d=await r.json();
  document.getElementById('showResult').textContent=d.rendered_report||JSON.stringify(d,null,2);
}
</script>
</body>
</html>
