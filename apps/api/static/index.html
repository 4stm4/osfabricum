<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSFabricum — Dashboard</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #30363d;
      --fg: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --yellow: #d29922; --cyan: #39c5cf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
      Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg);
    }
    header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    header .ver { color: var(--muted); font-size: 13px; }
    nav { display: flex; gap: 4px; padding: 0 24px; border-bottom: 1px solid var(--border); }
    nav button {
      background: none; border: none; color: var(--muted); padding: 12px 16px;
      cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent;
    }
    nav button.active { color: var(--fg); border-bottom-color: var(--accent); }
    nav button:hover { color: var(--fg); }
    main { padding: 24px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; text-transform: uppercase; font-size: 11px; }
    td.mono, th.mono { font-family: "SF Mono", Menlo, monospace; }
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 12px; }
    .s-success { background: rgba(63,185,80,.15); color: var(--green); }
    .s-failed { background: rgba(248,81,73,.15); color: var(--red); }
    .s-running { background: rgba(210,153,34,.15); color: var(--yellow); }
    .s-cancelled { background: rgba(139,148,158,.15); color: var(--muted); }
    .empty { color: var(--muted); padding: 24px; text-align: center; }
    .refresh { margin-left: auto; }
    button.act {
      background: var(--panel); border: 1px solid var(--border); color: var(--fg);
      padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    button.act:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>⚙ OSFabricum</h1>
    <span class="ver" id="version"></span>
    <button class="act refresh" onclick="loadCurrent()">↻ Refresh</button>
  </header>
  <nav>
    <button data-tab="builds" class="active">Builds</button>
    <button data-tab="artifacts">Artifacts</button>
    <button data-tab="distributions">Distributions</button>
    <button data-tab="boards">Boards</button>
    <button data-tab="workers">Workers</button>
  </nav>
  <main id="content"><div class="empty">Loading…</div></main>

  <script>
    let currentTab = "builds";

    const STATUS_CLASS = {
      success: "s-success", failed: "s-failed",
      running: "s-running", queued: "s-running", cancelled: "s-cancelled",
    };

    function badge(status) {
      const cls = STATUS_CLASS[status] || "";
      return `<span class="badge ${cls}">${status}</span>`;
    }

    async function api(path) {
      const r = await fetch(path);
      if (!r.ok) throw new Error(`${path} → ${r.status}`);
      return r.json();
    }

    function table(headers, rows) {
      if (!rows.length) return `<div class="empty">No records.</div>`;
      const head = headers.map(h => `<th class="${h.mono ? 'mono' : ''}">${h.label}</th>`).join("");
      const body = rows.map(r =>
        `<tr>${r.map((c, i) =>
          `<td class="${headers[i].mono ? 'mono' : ''}">${c}</td>`).join("")}</tr>`
      ).join("");
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    const renderers = {
      async builds() {
        const data = await api("/v1/builds?limit=50");
        const link = `<p><a href="/build/new" style="color:var(--accent)">→ New Build (Wizard)</a></p>`;
        return link + table(
          [{label:"Build"},{label:"Board"},{label:"Arch"},{label:"Status"},{label:"Hash",mono:true},{label:"Created"}],
          data.map(b => [
            `<b>${b.distribution || "?"}/${b.profile || "?"}</b>` +
              ` <span style="color:var(--muted)">${b.id.slice(0, 8)}</span>`,
            b.board || "—", b.arch || "—", badge(b.status),
            (b.resolution_hash || "").replace("sha256:", "").slice(0, 12) || "—",
            fmtDate(b.created_at),
          ])
        );
      },
      async artifacts() {
        const data = await api("/v1/artifacts?limit=100");
        return table(
          [{label:"Kind"},{label:"Name"},{label:"Arch"},{label:"SHA256",mono:true},{label:"Size"}],
          data.map(a => [
            a.kind, a.name, a.arch || "—",
            (a.blob_sha256 || "").slice(0, 16), fmtSize(a.size_bytes),
          ])
        );
      },
      async distributions() {
        const data = await api("/v1/distributions");
        const link = `<p><a href="/distributions" style="color:var(--accent)">→ Distribution Designer</a>
          &nbsp;·&nbsp; <a href="/profiles" style="color:var(--accent)">Profile Designer</a></p>`;
        return link + table(
          [{label:"Name"},{label:"Class"},{label:"Channel"},{label:"Profiles"}],
          data.map(d => [d.name, d.class || "—", d.default_channel, d.profile_count])
        );
      },
      async boards() {
        const data = await api("/v1/catalog/boards");
        return table(
          [{label:"Name"},{label:"Arch"},{label:"Boot"},{label:"Firmware"}],
          data.map(b => [b.name, b.arch, b.boot_scheme, b.firmware_required ? "yes" : "no"])
        );
      },
      async workers() {
        const data = await api("/v1/workers");
        return table(
          [{label:"Hostname"},{label:"Enabled"},{label:"Kinds"},{label:"Last seen"}],
          data.map(w => [
            w.hostname, w.enabled ? "yes" : "no",
            (w.kinds || []).join(", ") || "—", w.last_seen_at || "never",
          ])
        );
      },
    };

    function fmtSize(n) {
      if (n == null) return "—";
      if (n < 1024) return n + " B";
      if (n < 1048576) return (n / 1024).toFixed(1) + " KB";
      return (n / 1048576).toFixed(1) + " MB";
    }

    function fmtDate(iso) {
      return iso ? iso.replace("T", " ").slice(0, 19) : "—";
    }

    async function loadCurrent() {
      const content = document.getElementById("content");
      content.innerHTML = `<div class="empty">Loading…</div>`;
      try {
        content.innerHTML = await renderers[currentTab]();
      } catch (e) {
        content.innerHTML = `<div class="empty">Error: ${e.message}</div>`;
      }
    }

    document.querySelectorAll("nav button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTab = btn.dataset.tab;
        loadCurrent();
      });
    });

    (async () => {
      try {
        const h = await api("/healthz");
        const m = await fetch("/metrics").then(r => r.text());
        const ver = (m.match(/version="([^"]+)"/) || [])[1] || "";
        document.getElementById("version").textContent = ver ? `v${ver}` : "";
      } catch {}
      loadCurrent();
    })();
  </script>
</body>
</html>
