<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patch Queue — OSFabricum</title>
<style>
  :root{--bg:#121212;--surface:#1e1e1e;--border:#333;--text:#e0e0e0;--muted:#888;
    --accent:#1b5e20;--accent2:#66bb6a;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px}
  header h1{font-size:16px;font-weight:600}header a{color:var(--muted);font-size:12px;text-decoration:none}header a:hover{color:var(--text)}
  .tabs{display:flex;gap:2px;background:var(--bg);padding:8px 20px 0;border-bottom:1px solid var(--border)}
  .tab{padding:8px 16px;border:1px solid transparent;border-bottom:none;cursor:pointer;border-radius:4px 4px 0 0;color:var(--muted);font-size:13px}
  .tab.active{background:var(--surface);border-color:var(--border);color:var(--text)}.tab:hover:not(.active){color:var(--text)}
  .content{flex:1;overflow:auto;padding:20px}.pane{display:none}.pane.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:16px}
  .card h3{font-size:14px;margin-bottom:12px;color:var(--accent2)}
  .form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
  label{font-size:12px;color:var(--muted);min-width:130px}
  input,select,textarea{background:#2a2a2a;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-size:13px;flex:1;min-width:160px}
  textarea{resize:vertical;min-height:100px;font-family:monospace}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent2)}
  button{background:var(--accent);color:#fff;border:none;padding:7px 16px;border-radius:4px;cursor:pointer;font-size:13px}
  button:hover{background:var(--accent2)}button.secondary{background:#333}button.secondary:hover{background:#444}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500}
  td{padding:8px 10px;border-bottom:1px solid #292929}tr:hover td{background:#1a1a1a}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .badge-green{background:#1b5e20;color:#a5d6a7}.badge-grey{background:#37474f;color:#cfd8dc}
  .badge-yellow{background:#f57f17;color:#fff9c4}.badge-red{background:#b71c1c;color:#ffcdd2}
  .hash{font-family:monospace;font-size:11px;color:var(--muted)}
  pre{background:#0d0d0d;border:1px solid var(--border);border-radius:4px;padding:12px;font-size:12px;overflow:auto;max-height:400px;white-space:pre-wrap}
  .msg{padding:8px 12px;border-radius:4px;margin-top:8px;font-size:13px}
  .msg.ok{background:#1b5e20;color:#a5d6a7}.msg.err{background:#7f0000;color:#ffcdd2}
  .row-action{display:flex;gap:8px}
</style>
</head>
<body>
<header><h1>Patch Queue / Source Patch Manager</h1><a href="/">← Dashboard</a></header>
<div class="tabs">
  <div class="tab active" data-tab="sets">Patch Sets</div>
  <div class="tab" data-tab="kinds">Target Kinds</div>
  <div class="tab" data-tab="patches">Patches</div>
  <div class="tab" data-tab="render">Render</div>
</div>
<div class="content">

<div class="pane active" id="pane-sets">
  <div class="card">
    <h3>Create Patch Set</h3>
    <div class="form-row"><label>Name</label><input id="s-name" placeholder="linux-hardening-patches"></div>
    <div class="form-row"><label>Target Kind</label>
      <select id="s-target">
        <option value="kernel">kernel</option>
        <option value="package-source">package-source</option>
        <option value="branding">branding</option>
        <option value="config-template">config-template</option>
        <option value="build-recipe">build-recipe</option>
      </select>
    </div>
    <div class="form-row"><label>Description</label><input id="s-desc" placeholder="optional"></div>
    <div class="form-row"><button onclick="createSet()">Create</button></div>
    <div id="s-msg"></div>
  </div>
  <div class="card">
    <h3>Patch Sets</h3>
    <button class="secondary" style="margin-bottom:10px" onclick="loadSets()">Refresh</button>
    <table id="sets-table">
      <thead><tr><th>Name</th><th>Target</th><th>Hash</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-kinds">
  <div class="card">
    <h3>Patch Target Kinds</h3>
    <button class="secondary" style="margin-bottom:10px" onclick="loadKinds()">Refresh</button>
    <table id="kinds-table">
      <thead><tr><th>#</th><th>Kind</th><th>Label</th><th>Description</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-patches">
  <div class="card">
    <h3>Add / Update Patch</h3>
    <div class="form-row"><label>Patch Set ID</label><input id="p-psid" placeholder="patch set UUID"></div>
    <div class="form-row"><label>Sequence #</label><input id="p-seq" type="number" value="10" min="0"></div>
    <div class="form-row"><label>Name</label><input id="p-name" placeholder="0001-disable-debug-symbols.patch"></div>
    <div class="form-row"><label>Format</label>
      <select id="p-fmt">
        <option value="diff">diff</option>
        <option value="quilt">quilt</option>
        <option value="git-am">git-am</option>
      </select>
    </div>
    <div class="form-row"><label>Enabled?</label>
      <select id="p-enabled"><option value="true">Yes</option><option value="false">No</option></select>
    </div>
    <div class="form-row"><label>Patch Content</label>
      <textarea id="p-content" placeholder="--- a/file&#10;+++ b/file&#10;@@ ..."></textarea>
    </div>
    <div class="form-row"><button onclick="addPatch()">Add / Update</button></div>
    <div id="p-msg"></div>
  </div>
  <div class="card">
    <h3>List Patches</h3>
    <div class="form-row">
      <input id="p-list-psid" placeholder="Patch Set ID">
      <button onclick="loadPatches()">Load</button>
    </div>
    <table id="patches-table">
      <thead><tr><th>Seq</th><th>Name</th><th>Format</th><th>Enabled</th><th>Size</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="pane" id="pane-render">
  <div class="card">
    <h3>Render Patch Manifest</h3>
    <div class="form-row"><label>Patch Set ID</label><input id="r-psid" placeholder="patch set UUID"></div>
    <div class="form-row"><button onclick="renderSet()">Render</button></div>
    <div id="r-msg"></div>
  </div>
  <div class="card" id="r-result" style="display:none">
    <h3>Patch Manifest</h3>
    <div class="hash" id="r-hash"></div>
    <pre id="r-manifest" style="margin-top:12px"></pre>
  </div>
</div>

</div>
<script>
const API='/v1';
function tabs(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));t.classList.add('active');document.getElementById('pane-'+t.dataset.tab).classList.add('active')})});}
function msg(id,text,ok){const el=document.getElementById(id);el.className='msg '+(ok?'ok':'err');el.textContent=text;setTimeout(()=>el.textContent='',4000);}
async function api(method,path,body){const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);const r=await fetch(API+path,opts);if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText);}return r.json();}
function targetBadge(t){const cls={kernel:'badge-green','package-source':'badge-yellow',branding:'badge-grey','config-template':'badge-grey','build-recipe':'badge-yellow'}[t]||'badge-grey';return`<span class="badge ${cls}">${t}</span>`;}
function statusBadge(s){const cls={success:'badge-green',pending:'badge-yellow',failed:'badge-red',partial:'badge-yellow'}[s]||'badge-grey';return`<span class="badge ${cls}">${s}</span>`;}
async function loadSets(){try{const ps=await api('GET','/patch-sets');document.querySelector('#sets-table tbody').innerHTML=ps.map(s=>`<tr><td>${s.name}</td><td>${targetBadge(s.target_kind)}</td><td class="hash">${s.content_hash?s.content_hash.slice(7,23)+'…':'—'}</td><td><div class="row-action"><button class="secondary" onclick="fillPatches('${s.id}')">Patches</button><button class="secondary" onclick="fillRender('${s.id}')">Render</button></div></td></tr>`).join('');}catch(e){console.error(e);}}
async function loadKinds(){try{const ks=await api('GET','/patch-target-kinds');document.querySelector('#kinds-table tbody').innerHTML=ks.map(k=>`<tr><td>${k.display_order}</td><td>${targetBadge(k.kind)}</td><td>${k.label}</td><td>${k.description}</td></tr>`).join('');}catch(e){console.error(e);}}
async function createSet(){try{await api('POST','/patch-sets',{name:document.getElementById('s-name').value,target_kind:document.getElementById('s-target').value,description:document.getElementById('s-desc').value});msg('s-msg','Patch set created',true);loadSets();}catch(e){msg('s-msg',e.message,false);}}
async function addPatch(){const psid=document.getElementById('p-psid').value;try{await api('PUT',`/patch-sets/${psid}/patches`,{sequence_num:parseInt(document.getElementById('p-seq').value)||0,name:document.getElementById('p-name').value,patch_format:document.getElementById('p-fmt').value,is_enabled:document.getElementById('p-enabled').value==='true',patch_content:document.getElementById('p-content').value});msg('p-msg','Patch set',true);document.getElementById('p-list-psid').value=psid;loadPatches();}catch(e){msg('p-msg',e.message,false);}}
async function loadPatches(){const psid=document.getElementById('p-list-psid').value;if(!psid)return;try{const ps=await api('GET',`/patch-sets/${psid}/patches`);document.querySelector('#patches-table tbody').innerHTML=ps.map(p=>`<tr><td>${p.sequence_num}</td><td><code>${p.name}</code></td><td><span class="badge badge-grey">${p.patch_format}</span></td><td>${p.is_enabled?'<span class="badge badge-green">yes</span>':'<span class="badge badge-grey">no</span>'}</td><td style="color:var(--muted)">${p.patch_content_length} B</td></tr>`).join('');}catch(e){console.error(e);}}
function fillPatches(psid){document.getElementById('p-psid').value=psid;document.getElementById('p-list-psid').value=psid;document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));document.querySelector('[data-tab="patches"]').classList.add('active');document.getElementById('pane-patches').classList.add('active');loadPatches();}
function fillRender(psid){document.getElementById('r-psid').value=psid;document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));document.querySelector('[data-tab="render"]').classList.add('active');document.getElementById('pane-render').classList.add('active');}
async function renderSet(){const psid=document.getElementById('r-psid').value;try{const r=await api('POST',`/patch-sets/${psid}/render`);document.getElementById('r-hash').textContent=r.content_hash;document.getElementById('r-manifest').textContent=r.rendered_patch_manifest||'';document.getElementById('r-result').style.display='block';msg('r-msg','Rendered',true);loadSets();}catch(e){msg('r-msg',e.message,false);}}
tabs();loadSets();loadKinds();
</script>
</body></html>
