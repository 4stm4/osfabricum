<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSFabricum — Build Wizard</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #30363d;
      --fg: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --red: #f85149; --green: #3fb950;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg); }
    header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
    header h1 { font-size: 18px; margin: 0; }
    header a { color: var(--accent); text-decoration: none; font-size: 13px; margin-left: auto; }
    main { padding: 24px; max-width: 900px; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .panel h2 { margin: 0 0 12px; font-size: 13px; color: var(--muted); text-transform: uppercase; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    input, select { width: 100%; max-width: 380px; display: block; margin-top: 4px;
      background: var(--bg); border: 1px solid var(--border); color: var(--fg); padding: 6px 8px; border-radius: 6px; font-size: 13px; }
    .hint { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button { background: var(--panel); border: 1px solid var(--border); color: var(--fg);
      padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #0d1117; }
    .msg { font-size: 13px; min-height: 18px; margin: 8px 0; }
    .msg.err { color: var(--red); } .msg.ok { color: var(--green); }
    .kv { color: var(--muted); } .kv b { color: var(--fg); font-weight: 600; }
    .missing { color: var(--red); }
    pre { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-size: 12px; overflow:auto; }
  </style>
</head>
<body>
  <header>
    <h1>⚙ Build Wizard</h1>
    <a href="/">← Dashboard</a>
  </header>
  <main>
    <div class="panel">
      <h2>1 · Target</h2>
      <label>Distribution
        <select id="dist" onchange="onDist()"><option value="">— select —</option></select>
      </label>
      <label>Profile
        <select id="profile"><option value="">— select distribution first —</option></select>
      </label>
      <label>Board
        <select id="board" onchange="onBoard()"><option value="">— select —</option></select>
      </label>
    </div>

    <div class="panel">
      <h2>2 · Overrides (optional)</h2>
      <label>Package set
        <select id="ov-package-set"><option value="">profile default</option></select>
        <span class="hint" id="ps-hint"></span>
      </label>
      <label>Kernel
        <select id="ov-kernel"><option value="">profile default</option></select>
        <span class="hint" id="kernel-hint">select a board to list kernels for its architecture</span>
      </label>
    </div>

    <div class="panel">
      <h2>3 · Review &amp; prefetch</h2>
      <div class="actions">
        <button onclick="preview()">Preview plan</button>
        <button onclick="prefetch()">Prefetch (download inputs)</button>
        <span class="msg" id="plan-msg"></span>
      </div>
      <div id="plan"></div>
    </div>

    <div class="panel">
      <h2>4 · Actions</h2>
      <div class="actions">
        <button onclick="saveDraft()">Save draft</button>
        <button class="primary" onclick="build()">Build</button>
        <span class="msg" id="action-msg"></span>
      </div>
    </div>
  </main>

  <script>
    // Pure client of the M28/M29 write API. No build logic in the UI.
    let draftId = new URLSearchParams(location.search).get("draft");

    async function api(path, opts) {
      const r = await fetch(path, opts);
      if (!r.ok) { let d = `${r.status}`; try { d = (await r.json()).detail || d; } catch {} throw new Error(d); }
      return r.status === 204 ? null : r.json();
    }
    function msg(id, text, ok) { const el = document.getElementById(id); el.textContent = text || ""; el.className = "msg " + (text ? (ok ? "ok" : "err") : ""); }
    const $ = (id) => document.getElementById(id);
    function fill(sel, items, label, def) {
      sel.innerHTML = `<option value="">${def}</option>`;
      for (const it of items) sel.add(new Option(label(it), it.name));
    }

    function request() {
      const overrides = {};
      if ($("ov-package-set").value) overrides.package_set = $("ov-package-set").value;
      if ($("ov-kernel").value) overrides.kernel = $("ov-kernel").value;
      return {
        distribution: $("dist").value, profile: $("profile").value, board: $("board").value,
        overrides: Object.keys(overrides).length ? overrides : null,
      };
    }

    async function init() {
      try {
        for (const d of await api("/v1/distributions")) $("dist").add(new Option(d.name, d.name));
        for (const b of await api("/v1/catalog/boards")) {
          const o = new Option(`${b.name} (${b.arch})`, b.name); o.dataset.arch = b.arch; $("board").add(o);
        }
      } catch (e) {}
      if (draftId) {
        try {
          const d = await api(`/v1/build-drafts/${draftId}`);
          $("dist").value = d.distribution || ""; await onDist();
          $("profile").value = d.profile || ""; $("board").value = d.board || ""; await onBoard();
          if (d.overrides) { $("ov-package-set").value = d.overrides.package_set || ""; $("ov-kernel").value = d.overrides.kernel || ""; }
          msg("action-msg", `Loaded draft ${draftId.slice(0,8)}`, true);
        } catch (e) {}
      }
    }

    async function onDist() {
      const sel = $("profile"); sel.innerHTML = `<option value="">— select —</option>`;
      $("ps-hint").textContent = "";
      if (!$("dist").value) return;
      try {
        for (const p of await api(`/v1/profiles?distribution=${encodeURIComponent($("dist").value)}`)) sel.add(new Option(p.name, p.name));
        const sets = await api(`/v1/package-sets?distribution=${encodeURIComponent($("dist").value)}`);
        fill($("ov-package-set"), sets, s => s.name, "profile default");
        $("ps-hint").textContent = sets.length ? `${sets.length} package set(s) available` : "no package sets defined yet";
      } catch (e) {}
    }

    async function onBoard() {
      const opt = $("board").selectedOptions[0];
      const arch = opt ? opt.dataset.arch : "";
      try {
        const ks = $("board").value ? await api(`/v1/kernels?board=${encodeURIComponent($("board").value)}`) : [];
        fill($("ov-kernel"), ks, k => `${k.name} ${k.version} (${k.arch})`, "profile default");
        $("kernel-hint").textContent = ks.length
          ? `${ks.length} kernel(s) for ${arch}`
          : `no kernels registered for ${arch || "this board"} — add one via the kernel catalog`;
      } catch (e) {}
    }

    async function preview() {
      msg("plan-msg", "resolving…");
      try {
        const plan = await api("/v1/plan", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(request()) });
        const pkgs = plan.packages.map(p => `${p.name} ${p.version} <span class="${p.status === 'missing' ? 'missing' : ''}">(${p.status})</span>`).join("<br>") || "—";
        const missing = (plan.missing_artifacts || []).length;
        $("plan").innerHTML = `
          <p class="kv">hash: <b>${(plan.resolution_hash||'').replace('sha256:','').slice(0,16)}</b> ·
             arch: <b>${plan.arch}</b> ·
             kernel: <b>${plan.kernel ? plan.kernel.name + ' ' + plan.kernel.version : '—'}</b> ·
             toolchain: <b>${plan.toolchain ? plan.toolchain.name : '—'}</b></p>
          <p class="kv">packages:</p><p>${pkgs}</p>
          <p class="${missing ? 'missing' : 'kv'}">missing artifacts: <b>${missing}</b>${missing ? ' — ' + plan.missing_artifacts.join(', ') : ''}</p>`;
        msg("plan-msg", "resolved", true);
      } catch (e) { msg("plan-msg", e.message, false); $("plan").innerHTML = ""; }
    }

    async function prefetch() {
      msg("plan-msg", "computing prefetch plan…");
      try {
        const r = await api("/v1/prefetch", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(request()) });
        const jobs = (r.fetch_jobs || []);
        $("plan").innerHTML = `
          <p class="kv">Prefetch for this target — toolchain: <b>${r.toolchain || '—'}</b>, kernel: <b>${r.kernel || '—'}</b></p>
          <p class="kv">inputs to download / build (${jobs.length}):</p>
          ${jobs.length ? '<pre>' + jobs.join('\n') + '</pre>' : '<p class="kv">nothing to fetch — everything is already in the store.</p>'}`;
        msg("plan-msg", jobs.length ? `${jobs.length} input(s) needed` : "nothing to fetch", true);
      } catch (e) { msg("plan-msg", e.message, false); $("plan").innerHTML = ""; }
    }

    async function saveDraft() {
      try {
        const body = { ...request(), source_kind: "new" };
        if (draftId) { await api(`/v1/build-drafts/${draftId}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }); }
        else {
          const d = await api("/v1/build-drafts", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
          draftId = d.id; history.replaceState(null, "", `/build/new?draft=${draftId}`);
        }
        msg("action-msg", `Draft saved (${draftId.slice(0,8)})`, true);
      } catch (e) { msg("action-msg", e.message, false); }
    }

    async function build() {
      if (!$("dist").value || !$("profile").value || !$("board").value)
        return msg("action-msg", "select distribution, profile and board", false);
      try {
        const out = await api("/v1/builds", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(request()) });
        if (draftId) await api(`/v1/build-drafts/${draftId}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ status: "built" }) }).catch(() => {});
        msg("action-msg", `Build ${out.build_id.slice(0,8)} queued (hash ${out.resolution_hash.replace('sha256:','').slice(0,12)})`, true);
      } catch (e) { msg("action-msg", e.message, false); }
    }

    init();
  </script>
</body>
</html>
