<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSFabricum — Isolation Policies</title>
<style>
:root{--accent:#b71c1c;--accent-light:#c62828;--bg:#0a0a0f;--surface:#12121a;--border:#1e2030;--text:#e0e0e0;--muted:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.2rem;font-weight:600}
.badge{background:var(--accent);color:#fff;font-size:.65rem;padding:2px 7px;border-radius:10px;font-weight:700}
nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px}
.tab{padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-size:.85rem;transition:.2s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.pane{display:none;padding:24px}
.pane.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px}
input,select{background:#1a1a28;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:.85rem;width:100%;margin-bottom:12px}
button{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:.85rem;font-weight:600}
button:hover{background:var(--accent-light)}
.result{background:#0d0d18;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:monospace;font-size:.8rem;white-space:pre-wrap;max-height:400px;overflow:auto;color:#ffcdd2}
.pass{color:#69f0ae}.fail{color:#ef5350}
</style>
</head>
<body>
<header>
  <h1>Build Isolation / Sandbox Policies</h1>
  <span class="badge">M68</span>
</header>
<nav>
  <div class="tab active" onclick="show('list')">Policies</div>
  <div class="tab" onclick="show('create')">Create</div>
  <div class="tab" onclick="show('check')">Check</div>
</nav>

<div id="list" class="pane active">
  <div class="card"><button onclick="loadPolicies()">Load Policies</button></div>
  <div id="listResult" class="result">(click Load Policies)</div>
</div>

<div id="create" class="pane">
  <div class="card">
    <label>Name</label><input id="cName" placeholder="strict-sandbox">
    <label>Label</label><input id="cLabel" placeholder="Strict Sandbox">
    <label>Mode</label>
    <select id="cMode"><option>none</option><option>chroot</option><option>bubblewrap</option><option>nspawn</option><option>podman</option><option>firecracker</option><option>vm</option></select>
    <label>Write Access</label>
    <select id="cWrite"><option>build-dir</option><option>none</option><option>full</option></select>
    <label>Cache Mode</label>
    <select id="cCache"><option>ro</option><option>rw</option><option>none</option></select>
    <label><input type="checkbox" id="cNet" checked> Network Allowed</label><br><br>
    <label><input type="checkbox" id="cPriv"> Privileged</label><br><br>
    <button onclick="createPolicy()">Create Policy</button>
  </div>
  <div id="createResult" class="result"></div>
</div>

<div id="check" class="pane">
  <div class="card">
    <label>Policy ID</label><input id="chkPolicyId" placeholder="policy-uuid">
    <label>Required Mode</label>
    <select id="chkMode"><option>none</option><option>chroot</option><option>bubblewrap</option><option>nspawn</option><option>podman</option><option>firecracker</option><option>vm</option></select>
    <button onclick="checkPolicy()">Check</button>
  </div>
  <div id="checkResult" class="result"></div>
</div>

<script>
function show(id){document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');event.target.classList.add('active')}
async function loadPolicies(){
  const r=await fetch('/v1/isolation-policies');
  const d=await r.json();
  if(!d.length){document.getElementById('listResult').textContent='(no policies)';return}
  document.getElementById('listResult').textContent=d.map(x=>`${x.id.slice(0,8)}  ${x.name}  mode=${x.mode}  write=${x.write_access}  net=${x.network_allowed?'Y':'N'}`).join('\n');
}
async function createPolicy(){
  const body={name:document.getElementById('cName').value,label:document.getElementById('cLabel').value,mode:document.getElementById('cMode').value,write_access:document.getElementById('cWrite').value,cache_mode:document.getElementById('cCache').value,network_allowed:document.getElementById('cNet').checked,privileged:document.getElementById('cPriv').checked};
  const r=await fetch('/v1/isolation-policies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  document.getElementById('createResult').textContent=JSON.stringify(await r.json(),null,2);
}
async function checkPolicy(){
  const pid=document.getElementById('chkPolicyId').value.trim();
  const required_mode=document.getElementById('chkMode').value;
  const r=await fetch('/v1/isolation-policies/'+pid);
  const d=await r.json();
  const MODES=['none','chroot','bubblewrap','nspawn','podman','firecracker','vm'];
  const ok=MODES.indexOf(d.mode)>=MODES.indexOf(required_mode);
  const el=document.getElementById('checkResult');
  el.textContent=`policy mode: ${d.mode}\nrequired:    ${required_mode}\nresult: ${ok?'PASS':'FAIL'}`;
  el.className='result '+(ok?'pass':'fail');
}
</script>
</body>
</html>
