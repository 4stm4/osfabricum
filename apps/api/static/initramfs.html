<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSFabricum — Initramfs Designer</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --red:#f85149; --green:#3fb950; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; }
    header h1 { font-size:18px; margin:0; } header a { color:var(--accent); text-decoration:none; font-size:13px; margin-left:auto; }
    main { padding:24px; max-width:1000px; }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
    .panel h2 { margin:0 0 12px; font-size:13px; color:var(--muted); text-transform:uppercase; }
    label { display:flex; flex-direction:column; font-size:12px; color:var(--muted); gap:4px; margin-bottom:8px; }
    label.cb { flex-direction:row; align-items:center; gap:6px; }
    input,select { background:var(--bg); border:1px solid var(--border); color:var(--fg); padding:6px 8px; border-radius:6px; font-size:13px; }
    form { display:flex; flex-wrap:wrap; gap:10px; align-items:end; }
    button { background:var(--panel); border:1px solid var(--border); color:var(--fg); padding:7px 13px; border-radius:6px; cursor:pointer; font-size:13px; }
    button:hover { border-color:var(--accent); } button.primary { background:var(--accent); border-color:var(--accent); color:#0d1117; }
    table { width:100%; border-collapse:collapse; font-size:13px; } th,td { text-align:left; padding:6px 10px; border-bottom:1px solid var(--border); }
    th { color:var(--muted); text-transform:uppercase; font-size:11px; }
    .msg { font-size:13px; min-height:18px; margin:8px 0; } .msg.err { color:var(--red); } .msg.ok { color:var(--green); }
    .empty { color:var(--muted); padding:12px; } .sub { font-size:12px; color:var(--muted); margin:8px 0 4px; text-transform:uppercase; }
  </style>
</head>
<body>
  <header><h1>⚙ Initramfs Designer</h1><a href="/">← Dashboard</a></header>
  <main>
    <div class="panel">
      <h2>New initramfs profile</h2>
      <form id="create-form">
        <label>Name<input id="f-name" required placeholder="recovery-aarch64"></label>
        <label>Type<select id="f-type">
          <option>minimal</option><option>recovery</option><option>encrypted</option>
          <option>network</option><option>debug</option></select></label>
        <label>Compression<select id="f-comp"><option>zstd</option><option>gzip</option><option>xz</option><option>lz4</option></select></label>
        <label class="cb"><input type="checkbox" id="f-modules" checked>modules</label>
        <label class="cb"><input type="checkbox" id="f-net">network</label>
        <label class="cb"><input type="checkbox" id="f-debug">debug shell</label>
        <label class="cb"><input type="checkbox" id="f-unlock">encrypted unlock</label>
        <button class="primary" type="submit">Create</button>
      </form>
      <div class="msg" id="create-msg"></div>
    </div>
    <div class="panel">
      <h2>Profiles</h2>
      <div class="msg" id="list-msg"></div>
      <div id="list"><div class="empty">Loading…</div></div>
    </div>
    <div class="panel" id="detail-panel" style="display:none">
      <h2 id="detail-title">Detail</h2>
      <div id="detail"></div>
      <p class="sub">Add package</p>
      <form id="pkg-form">
        <label>Package<input id="p-name" placeholder="cryptsetup"></label>
        <label class="cb"><input type="checkbox" id="p-req" checked>required</label>
        <button type="submit">Add package</button>
      </form>
      <div class="msg" id="detail-msg"></div>
      <div style="margin-top:8px"><button onclick="resolveP()">Resolve</button> <button onclick="validateP()">Validate</button></div>
    </div>
  </main>
  <script>
    let current = null;
    async function api(p, o) { const r = await fetch(p, o); if (!r.ok) { let d=`${r.status}`; try { d=(await r.json()).detail||d; } catch {} throw new Error(d); } return r.status===204?null:r.json(); }
    function msg(id,t,ok){ const e=document.getElementById(id); e.textContent=t||""; e.className="msg "+(t?(ok?"ok":"err"):""); }
    const $=(id)=>document.getElementById(id);

    async function loadList() {
      try {
        const rows = await api("/v1/initramfs/profiles");
        $("list").innerHTML = rows.length ? `<table><thead><tr><th>Name</th><th>Type</th><th>Compression</th><th></th></tr></thead><tbody>` +
          rows.map(p=>`<tr><td><strong>${p.name}</strong></td><td>${p.profile_type||"—"}</td><td>${p.compression||"—"}</td>
            <td><button onclick="openP('${p.id}','${p.name}')">Open</button></td></tr>`).join("")+`</tbody></table>`
          : `<div class="empty">No profiles yet.</div>`;
      } catch(e){ $("list").innerHTML=`<div class="empty">Error: ${e.message}</div>`; }
    }
    async function openP(id, name) {
      current = id; $("detail-panel").style.display="block"; $("detail-title").textContent="Initramfs · "+name;
      try {
        const d = await api(`/v1/initramfs/profiles/${id}`);
        const pkgs = (d.packages||[]).map(x=>x.package_name).join(", ")||"—";
        const scripts = (d.scripts||[]).map(x=>x.script_name).join(", ")||"—";
        const hooks = (d.hooks||[]).map(x=>x.hook_name).join(", ")||"—";
        $("detail").innerHTML = `<p style="color:var(--muted)">packages: <b style="color:var(--fg)">${pkgs}</b></p>
          <p style="color:var(--muted)">scripts: ${scripts}</p><p style="color:var(--muted)">hooks: ${hooks}</p>`;
      } catch(e){ $("detail").innerHTML=`<div class="empty">Error: ${e.message}</div>`; }
    }
    $("create-form").addEventListener("submit", async ev=>{ ev.preventDefault();
      try { await api("/v1/initramfs/profiles",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:$("f-name").value.trim(), profile_type:$("f-type").value, compression:$("f-comp").value,
          include_modules:$("f-modules").checked, enable_network:$("f-net").checked,
          enable_debug_shell:$("f-debug").checked, enable_encryption_unlock:$("f-unlock").checked})});
        msg("create-msg",`Created '${$("f-name").value}'`,true); $("create-form").reset(); loadList(); }
      catch(e){ msg("create-msg",e.message,false); } });
    $("pkg-form").addEventListener("submit", async ev=>{ ev.preventDefault(); if(!current) return;
      try { await api(`/v1/initramfs/profiles/${current}/packages`,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({package_name:$("p-name").value.trim(), required:$("p-req").checked})});
        msg("detail-msg","package added",true); openP(current,$("detail-title").textContent.replace("Initramfs · ","")); }
      catch(e){ msg("detail-msg",e.message,false); } });
    async function resolveP(){ if(!current) return;
      try { const r=await api(`/v1/initramfs/profiles/${current}/resolve`,{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});
        msg("detail-msg","resolved: "+JSON.stringify(r).slice(0,160),true); } catch(e){ msg("detail-msg",e.message,false); } }
    async function validateP(){ if(!current) return;
      try { const r=await api(`/v1/initramfs/profiles/${current}/validate`,{method:"POST"}); msg("detail-msg","validation: "+JSON.stringify(r).slice(0,160),true); }
      catch(e){ msg("detail-msg",e.message,false); } }
    loadList();
  </script>
</body>
</html>
